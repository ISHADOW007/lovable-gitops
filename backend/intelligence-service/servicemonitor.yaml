apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: intelligence-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: intelligence-service

  namespaceSelector:
    matchNames:
      - lovable-core

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s