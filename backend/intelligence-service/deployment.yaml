apiVersion: apps/v1
kind: Deployment

metadata:
  name: intelligence-service
  namespace: lovable-core

spec:
  replicas: 1

  selector:
    matchLabels:
      app: intelligence-service

  template:
    metadata:
      labels:
        app: intelligence-service

    spec:
      containers:
        - name: intelligence-service

          image: satyamgrao007/lovable-intelligence-service

          imagePullPolicy: Always

          ports:
            - containerPort: 9030

          env:

            - name: SPRING_PROFILES_ACTIVE
              value: k8s

            - name: CONFIG_SERVER_URL
              value: http://config-service.lovable-core.svc.cluster.local:8888

            - name: SPRING_CLOUD_CONFIG_FAIL_FAST
              value: "false"

            - name: SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS
              value: "10"

            - name: SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL
              value: "3000"

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: INTELLIGENCE_DB_PASSWORD

            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AI_API_KEY

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

          resources:
            requests:
              cpu: 150m
              memory: 250Mi

            limits:
              cpu: 200m
              memory: 480Mi

          readinessProbe:
            httpGet:
              path: /intelligence/actuator/health
              port: 9030

            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 90

          startupProbe:
            httpGet:
              path: /intelligence/actuator/health
              port: 9030

            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5