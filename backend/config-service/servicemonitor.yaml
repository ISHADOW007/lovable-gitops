apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: config-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: config-service

  namespaceSelector:
    matchNames:
      - lovable-core

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s