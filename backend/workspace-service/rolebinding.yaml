apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-manager-binding
  namespace: lovable-previews

subjects:
  - kind: ServiceAccount
    name: workspace-service-account
    namespace: lovable-core

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: preview-manager-role