apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-manager-role
  namespace: lovable-previews

rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/log
      - pods/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete