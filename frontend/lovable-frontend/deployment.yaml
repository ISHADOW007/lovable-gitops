apiVersion: apps/v1
kind: Deployment

metadata:
  name: lovable-frontend
  namespace: lovable-core

spec:
  replicas: 1

  selector:
    matchLabels:
      app: lovable-frontend

  template:
    metadata:
      labels:
        app: lovable-frontend

    spec:
      containers:
        - name: lovable-frontend

          image: satyamgrao007/lovable-frontend

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: 50m
              memory: 128Mi

            limits:
              cpu: 150m
              memory: 200Mi