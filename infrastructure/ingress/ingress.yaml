apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lovable-ingress
  namespace: lovable-core

spec:
  ingressClassName: nginx

  rules:

  # Frontend
  - host: lovable.localdev.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lovable-frontend
            port:
              number: 80


  # API Gateway
  - host: api.localdev.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80


  # Preview Applications (Wildcard)
  - host: "*.previews.127.0.0.1.nip.io"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lovable-me-proxy
            port:
              number: 80