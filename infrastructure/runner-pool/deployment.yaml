apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner-pool
  namespace: lovable-previews
spec:
  replicas: 2
  selector:
    matchLabels:
      app: runner
      status: idle
  template:
    metadata:
      labels:
        app: runner
        status: idle
    spec:
      volumes:
        - name: workspace
          emptyDir: {}

      containers:
        # Runner Container
        - name: runner
          image: node:20-alpine
          workingDir: /app
          command: ["/bin/sh", "-c", "sleep infinity"]

          volumeMounts:
            - name: workspace
              mountPath: /app

          ports:
            - containerPort: 5173

          resources:
            requests:
              cpu: "80m"
              memory: "312Mi"
            limits:
              cpu: "450m"
              memory: "600Mi"

        # MinIO Sync Container
        - name: syncer
          image: minio/mc
          command: ["/bin/sh", "-c", "sleep infinity"]

          env:
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_USER

            - name: MINIO_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_PASSWORD

            - name: MC_HOST_myminio
              value: "http://$(MINIO_USER):$(MINIO_PASS)@minio.lovable-core.svc.cluster.local:9000"

          volumeMounts:
            - name: workspace
              mountPath: /app

          resources:
            requests:
              cpu: "60m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"