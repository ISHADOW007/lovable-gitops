apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lovable-frontend
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_USERNAME/lovable-gitops.git
    targetRevision: main
    path: frontend

  destination:
    server: https://kubernetes.default.svc
    namespace: lovable-core

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true